<!doctype html>
<html lang="tr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarif Kartlari</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 min-h-screen p-6 md:p-12">
    <div class="container mx-auto">
      <h1 class="text-3xl font-black mb-5 text-slate-800">Recipes</h1>

      <div
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"
        id="recipecontainer"
      ></div>
    </div>

    <script>
      const recipecontainer = document.getElementById("recipecontainer");
      const API_URL = "https://dummyjson.com/recipes";

      fetch(API_URL)
        .then((res) => res.json())
        .then((data) => {
          const tarifler = data.recipes;

          recipecontainer.innerHTML = tarifler
            .map((tarif) => {
              return `
                        <div class="card bg-white shadow-md border border-slate-100 hover:shadow-2xl transition-shadow duration-500">
                            <figure class="h-60">
                                <img src="${tarif.image}" alt="${tarif.name}" class="w-full h-full object-cover" />
                            </figure>
                            
                            <div class="card-body p-6">
                                <h2 class="card-title text-2xl font-bold text-slate-800 mb-2">${tarif.name}</h2>
                                
                                <div class="flex flex-wrap gap-2 mb-4">
                                    <span class="px-3 py-1 rounded-full text-xs bg-[#4B3BC2] text-white">${tarif.cuisine}</span>
                                    <span class="px-3 py-1 rounded-full text-xs bg-[#F24E91] text-white">${tarif.difficulty}</span>
                                    <span class="px-3 py-1 rounded-full text-xs bg-[#00C9B1] text-black">${tarif.caloriesPerServing} kcal</span>
                                </div>

                                <div class="flex items-center gap-2 text-slate-500 text-sm mb-4">
                                    <span>Prep: <span class="font-semibold text-slate-700">${tarif.prepTimeMinutes} min</span></span>
                                    <span>|</span>
                                    <span>Cook: <span class="font-semibold text-slate-700">${tarif.cookTimeMinutes} min</span></span>
                                    <span>|</span>
                                    <span>Servings: <span class="font-semibold text-slate-700">${tarif.servings}</span></span>
                                </div>

                                <div class="flex items-center gap-2 mb-6 py-2 border-y border-slate-50">
                                    <div class="rating rating-xs">
                                        <input type="radio" class="mask mask-star-2 bg-orange-400" disabled 'checked' : ''} />
                                        <input type="radio" class="mask mask-star-2 bg-orange-400" disabled 'checked' : ''} />
                                        <input type="radio" class="mask mask-star-2 bg-orange-400" disabled 'checked' : ''} />
                                        <input type="radio" class="mask mask-star-2 bg-orange-400" disabled 'checked' : ''} />
                                        <input type="radio" class="mask mask-star-2 bg-orange-400" disabled 'checked' : ''} />
                                    </div>
                                    <span class="text-xs font-bold text-slate-600">${tarif.rating}</span>
                                    <span class="text-xs text-slate-500">(${tarif.reviewCount} reviews)</span>
                                </div>

                                <div class="flex flex-wrap gap-1 mt-auto">
                                    ${tarif.tags
                                      .map(
                                        (tag) => `
                                        <span class="text-[10px] tracking-wider font-semibold border border-slate-400 px-2 py-0.5 rounded text-slate-500">${tag}</span>
                                    `,
                                      )
                                      .join("")}
                                </div>
                            </div>
                        </div>
                    `;
            })
            .join("");
        });
    </script>
  </body>
</html>
